<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kodi Screen Share</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 42rem; }
    button { padding: 0.75rem 1rem; margin-right: 0.75rem; }
    .status { margin: 1rem 0; font-weight: 600; }
    .hint { color: #555; }
    .metrics { margin-top: 1.5rem; padding: 1rem; border: 1px solid #ddd; border-radius: 0.5rem; }
    .metric-row { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    #lagChart { width: 100%; height: 120px; background: #fafafa; border: 1px solid #eee; border-radius: 0.25rem; }
  </style>
</head>
<body>
  <h1>Kodi Screen Share</h1>
  <p>Share your screen to the meeting room TV.</p>
  <div class="status" id="status">Idle</div>
  <p class="hint">Use a modern browser. Screen audio is shared when your browser/OS allows it (Chromium; Firefox on Linux usually can't).</p>
  <button id="share">Share Screen</button>
  <button id="stop" disabled>Stop Sharing</button>
  <button id="resync" disabled title="Drop to the live edge if playback has fallen behind">Resync</button>

  <div class="metrics" id="metrics" hidden>
    <div class="metric-row">
      <span>Playback lag (est.): <strong id="lagValue">–</strong></span>
      <span class="hint" id="encStats">–</span>
    </div>
    <canvas id="lagChart" width="640" height="120"></canvas>
  </div>

  <script>
    // The encoder output is normalized to a constant 16:9 canvas, capped at
    // 1440p (the Raspberry Pi 5 software-decodes H.264, so resolution is bounded
    // for the decoder, never upscaled). Keeping resolution constant for the whole
    // session avoids mid-stream SPS/PPS changes that freeze Kodi, and the fixed
    // capture rate keeps frames flowing even when the shared content is static.
    const CAP_WIDTH = 2560;
    const CAP_HEIGHT = 1440;
    const CAPTURE_FPS = 30;       // ceiling for the published canvas stream
    const STATIC_FLOOR_FPS = 10;  // redraw at least this often so static content keeps flowing
    const METRICS_INTERVAL_MS = 2000;

    // Resync drains Kodi to the live edge: detach the published track for a moment so
    // no new frames arrive; Kodi plays through its buffer at normal speed until it
    // reaches the live edge, then we re-attach. Manual only — any real activity (e.g.
    // a workspace switch, which briefly drops the encoder framerate) drains it on its
    // own, so an automatic resync isn't worth the startup disruption.
    const RESYNC_DURATION_MS = 3000;       // ~how much buffer to drain; tune to taste

    const statusEl = document.getElementById('status');
    const shareButton = document.getElementById('share');
    const stopButton = document.getElementById('stop');
    const resyncButton = document.getElementById('resync');
    const metricsEl = document.getElementById('metrics');
    const lagValueEl = document.getElementById('lagValue');
    const encStatsEl = document.getElementById('encStats');
    const lagChart = document.getElementById('lagChart');

    let stream;            // raw getDisplayMedia (screen) stream
    let peerConnection;
    let whipResourceUrl;
    let offerData;
    let queuedCandidates = [];

    // Canvas compositor state.
    let compositorCanvas;
    let compositorVideo;
    let compositorStream;  // canvas.captureStream output (what we publish)
    let compositorRVFC;    // requestVideoFrameCallback handle
    let compositorTick;    // setInterval backup draw handle
    let compositorDraw;    // the canvas draw() closure
    let videoSender;       // RTCRtpSender for the published canvas (video) track
    let audioSender;       // RTCRtpSender for the screen-capture audio track (if any)
    let resyncTimer;       // ends an in-progress resync
    let resyncing = false;

    // Monitoring state.
    let metricsTimer;
    let prevSenderStats;   // {bytes, timestamp} for bitrate deltas

    function log(...args) {
      console.log('[kodi-screenshare]', ...args);
    }

    function logError(...args) {
      console.error('[kodi-screenshare]', ...args);
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function setSharingUI(isSharing) {
      shareButton.disabled = isSharing;
      stopButton.disabled = !isSharing;
      resyncButton.disabled = !isSharing;
    }

    function parseIceServers(linkHeader) {
      if (!linkHeader) return [];
      return linkHeader.split(', ').map((link) => {
        const match = link.match(/^<(.+?)>; rel="ice-server"(?:; username="(.*?)"; credential="(.*?)"; credential-type="password")?/i);
        if (!match) return null;

        const server = { urls: [match[1]] };
        if (match[2] !== undefined) {
          server.username = JSON.parse(`"${match[2]}"`);
          server.credential = JSON.parse(`"${match[3]}"`);
          server.credentialType = 'password';
        }
        return server;
      }).filter(Boolean);
    }

    function parseOfferData(sdp) {
      const data = { iceUfrag: '', icePwd: '', medias: [] };
      for (const line of sdp.split('\r\n')) {
        if (line.startsWith('m=')) {
          data.medias.push(line.slice(2));
        } else if (!data.iceUfrag && line.startsWith('a=ice-ufrag:')) {
          data.iceUfrag = line.slice('a=ice-ufrag:'.length);
        } else if (!data.icePwd && line.startsWith('a=ice-pwd:')) {
          data.icePwd = line.slice('a=ice-pwd:'.length);
        }
      }
      return data;
    }

    function generateSdpFragment(candidates) {
      const candidatesByMedia = new Map();
      for (const candidate of candidates) {
        const mid = candidate.sdpMLineIndex;
        if (!candidatesByMedia.has(mid)) candidatesByMedia.set(mid, []);
        candidatesByMedia.get(mid).push(candidate);
      }

      let fragment = `a=ice-ufrag:${offerData.iceUfrag}\r\na=ice-pwd:${offerData.icePwd}\r\n`;
      offerData.medias.forEach((media, mid) => {
        const mediaCandidates = candidatesByMedia.get(mid);
        if (!mediaCandidates) return;

        fragment += `m=${media}\r\na=mid:${mid}\r\n`;
        mediaCandidates.forEach((candidate) => {
          fragment += `a=${candidate.candidate}\r\n`;
        });
      });

      return fragment;
    }

    async function requestIceServers(whipUrl) {
      log('requesting ICE servers', whipUrl);
      const response = await fetch(whipUrl, { method: 'OPTIONS' });
      if (!response.ok) {
        log('ICE server request returned non-OK status', response.status);
        return [];
      }

      const iceServers = parseIceServers(response.headers.get('Link'));
      log('received ICE server config', { count: iceServers.length });
      return iceServers;
    }

    async function sendLocalCandidates(candidates) {
      if (!whipResourceUrl || candidates.length === 0) return;

      log('sending ICE candidates', { count: candidates.length, url: whipResourceUrl });

      const response = await fetch(whipResourceUrl, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/trickle-ice-sdpfrag',
          'If-Match': '*',
        },
        body: generateSdpFragment(candidates),
      });

      if (!response.ok && response.status !== 204) {
        throw new Error(`Could not send ICE candidates: ${response.status}`);
      }

      log('ICE candidates accepted', { status: response.status });
    }

    function handleLocalCandidate(event) {
      if (!event.candidate) {
        log('local ICE gathering completed');
        return;
      }

      log('local ICE candidate', {
        protocol: event.candidate.protocol,
        type: event.candidate.type,
        mid: event.candidate.sdpMid,
      });

      if (!whipResourceUrl) {
        queuedCandidates.push(event.candidate);
        log('queued ICE candidate until WHIP session URL is available', { queued: queuedCandidates.length });
        return;
      }

      sendLocalCandidates([event.candidate]).catch((error) => {
        logError('failed to send local ICE candidate', error);
        setStatus(error.message || 'Could not send ICE candidates.');
      });
    }

    function handleConnectionStateChange() {
      if (!peerConnection) return;

      log('peer connection state changed', peerConnection.connectionState);

      if (peerConnection.connectionState === 'connected') {
        setSharingUI(true);
        setStatus('Sharing');
        startMonitoring();
      } else if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'closed') {
        stopSharing().catch((error) => {
          logError('failed to stop after connection loss', error);
          setStatus('Connection lost.');
        });
      }
    }

    async function ensureAvailability() {
      log('checking current session availability');
      const response = await fetch('/api/status');
      const status = await response.json();
      log('status response', status);
      if (!status.active) return;

      const confirmed = window.confirm('Someone is currently sharing. Take over?');
      if (!confirmed) throw new Error('Takeover cancelled.');

      log('taking over active session');
      const takeover = await fetch('/api/takeover', { method: 'POST' });
      if (!takeover.ok) throw new Error('Could not take over the current session.');
      log('takeover request completed');
    }

    // Prefer HEVC (H.265) when the sender can hardware-encode it, otherwise H.264.
    // The Raspberry Pi 5 has no hardware H.264 decoder but does have a hardware HEVC
    // decoder, so an HEVC stream moves decode off the Pi's CPU (the pipeline's real
    // bottleneck). Browsers only advertise video/H265 in getCapabilities when a
    // hardware HEVC encoder is present (Chrome 136+, Safari 18+; never Firefox), so
    // this auto-detects and falls back to software-decoded H.264 everywhere else.
    // H.264 stays in the list as a lower preference, so if MediaMTX can't accept
    // HEVC it simply answers H.264 and the stream still works.
    function preferHardwareFriendlyCodec(transceiver) {
      const capabilities = RTCRtpSender.getCapabilities('video');
      if (!capabilities || !Array.isArray(capabilities.codecs)) return 'default';

      const isType = (codec, type) => codec.mimeType.toLowerCase() === type;
      const hasType = (type) => capabilities.codecs.some(codec => isType(codec, type));
      const preferred = hasType('video/h265') ? 'video/h265'
        : hasType('video/h264') ? 'video/h264'
        : null;
      if (!preferred) return 'default';

      const chosen = capabilities.codecs.filter(codec => isType(codec, preferred));
      const rest = capabilities.codecs.filter(codec => !isType(codec, preferred));
      transceiver.setCodecPreferences([...chosen, ...rest]);

      const label = preferred === 'video/h265' ? 'H265' : 'H264';
      log('preferred video codec', label);
      return label;
    }

    // computeCanvasSize returns the smallest 16:9 box that contains the source
    // without upscaling it, clamped to the 1440p cap and rounded to even dims.
    function computeCanvasSize(w, h) {
      let boxW, boxH;
      if (w / h >= 16 / 9) {
        boxW = w;
        boxH = Math.round(w * 9 / 16);
      } else {
        boxH = h;
        boxW = Math.round(h * 16 / 9);
      }
      const k = Math.min(1, CAP_WIDTH / boxW, CAP_HEIGHT / boxH);
      const even = (x) => Math.max(2, Math.floor(x) - (Math.floor(x) % 2));
      return { width: even(boxW * k), height: even(boxH * k) };
    }

    function drawContain(ctx, video, cw, ch) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cw, ch);
      if (!vw || !vh) return;
      const scale = Math.min(cw / vw, ch / vh);
      const dw = vw * scale;
      const dh = vh * scale;
      ctx.drawImage(video, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
    }

    function bitrateForHeight(height) {
      if (height >= 1300) return 22_000_000;
      if (height >= 1000) return 15_000_000;
      return 8_000_000;
    }

    // startCompositor normalizes the captured screen into a constant 16:9 canvas
    // and returns a steady, fixed-resolution track to publish.
    async function startCompositor(screenStream) {
      compositorVideo = document.createElement('video');
      compositorVideo.muted = true;
      compositorVideo.playsInline = true;
      compositorVideo.srcObject = screenStream;
      await compositorVideo.play().catch(() => {});

      // Lock the canvas to the source's resolution at share start. Fall back
      // after a short timeout so a track that never reports metadata can't hang
      // the whole share flow (computeCanvasSize then uses the 1920x1080 default).
      await new Promise((resolve) => {
        if (compositorVideo.videoWidth) return resolve();
        const done = () => resolve();
        compositorVideo.addEventListener('loadedmetadata', done, { once: true });
        setTimeout(done, 3000);
      });

      const srcW = compositorVideo.videoWidth || 1920;
      const srcH = compositorVideo.videoHeight || 1080;
      const size = computeCanvasSize(srcW, srcH);
      log('locked encoder resolution', { source: { w: srcW, h: srcH }, canvas: size });

      compositorCanvas = document.createElement('canvas');
      compositorCanvas.width = size.width;
      compositorCanvas.height = size.height;
      const ctx = compositorCanvas.getContext('2d', { alpha: false });

      compositorDraw = () => drawContain(ctx, compositorVideo, size.width, size.height);
      compositorDraw();

      // Drive the canvas: rVFC for smooth motion (up to CAPTURE_FPS) plus a slow
      // floor so static content keeps emitting frames. captureStream samples the
      // canvas, so the paint rate is effectively the publish rate — which is why
      // resync() can drain Kodi by lowering it, and why backgrounding the control
      // tab (which throttles these timers to ~1 fps) collapses the stream. Fixing
      // the background case means moving this into a Web Worker + OffscreenCanvas
      // (not visibility-throttled).
      startFrameLoop(Math.round(1000 / STATIC_FLOOR_FPS), true);

      compositorStream = compositorCanvas.captureStream(CAPTURE_FPS);
      const [canvasTrack] = compositorStream.getVideoTracks();
      canvasTrack.contentHint = 'detail';
      return { canvasTrack, height: size.height };
    }

    function stopCompositor() {
      cancelResync();
      stopFrameLoop();
      if (compositorVideo) {
        compositorVideo.srcObject = null;
        compositorVideo = null;
      }
      if (compositorStream) {
        compositorStream.getTracks().forEach(track => track.stop());
        compositorStream = null;
      }
      compositorCanvas = null;
      compositorDraw = null;
    }

    // startFrameLoop / stopFrameLoop drive the canvas paint cadence (= the publish
    // rate, since captureStream samples the canvas). resync() reuses them to throttle.
    function startFrameLoop(intervalMs, useRvfc) {
      stopFrameLoop();
      if (useRvfc && compositorVideo && 'requestVideoFrameCallback' in compositorVideo) {
        const onFrame = () => {
          if (compositorDraw) compositorDraw();
          if (compositorVideo) compositorRVFC = compositorVideo.requestVideoFrameCallback(onFrame);
        };
        compositorRVFC = compositorVideo.requestVideoFrameCallback(onFrame);
      }
      compositorTick = setInterval(() => { if (compositorDraw) compositorDraw(); }, intervalMs);
    }

    function stopFrameLoop() {
      if (compositorTick) {
        clearInterval(compositorTick);
        compositorTick = null;
      }
      if (compositorRVFC && compositorVideo && typeof compositorVideo.cancelVideoFrameCallback === 'function') {
        try { compositorVideo.cancelVideoFrameCallback(compositorRVFC); } catch (e) { /* ignore */ }
      }
      compositorRVFC = null;
    }

    function cancelResync() {
      if (resyncTimer) { clearTimeout(resyncTimer); resyncTimer = null; }
      resyncing = false;
    }

    // resync drains Kodi's buffer to the live edge by detaching the published track
    // for RESYNC_DURATION_MS. With no new frames arriving, Kodi keeps playing its
    // buffered video at normal speed until it hits the live edge; re-attaching then
    // resumes at minimal lag. (Throttling the canvas paint rate does NOT work here:
    // captureStream keeps sampling the unchanged canvas in the foreground, so the
    // outgoing frame rate stays high — only detaching the track actually starves it.)
    async function resync(reason) {
      if (!compositorStream || !videoSender || resyncing) return;
      const videoTrack = compositorStream.getVideoTracks()[0];
      if (!videoTrack) return;
      const audioTrack = stream ? stream.getAudioTracks()[0] : null;

      // Detach video — and audio in lock-step, so A/V stays in sync through the drain.
      const pairs = [{ sender: videoSender, track: videoTrack }];
      if (audioSender && audioTrack) pairs.push({ sender: audioSender, track: audioTrack });

      resyncing = true;
      resyncButton.disabled = true;
      setStatus('Resyncing…');
      log('resync: draining to live edge', { reason: reason || 'manual', audio: pairs.length > 1 });

      try {
        await Promise.all(pairs.map(p => p.sender.replaceTrack(null)));
      } catch (error) {
        logError('resync: could not detach tracks', error);
        await Promise.all(pairs.map(p => p.sender.replaceTrack(p.track).catch(() => {})));
        resyncing = false;
        if (peerConnection) { setStatus('Sharing'); resyncButton.disabled = false; }
        return;
      }

      resyncTimer = setTimeout(async () => {
        resyncTimer = null;
        try {
          await Promise.all(pairs.map(p => p.sender.replaceTrack(p.track)));
        } catch (error) {
          logError('resync: could not re-attach tracks', error);
        }
        resyncing = false;
        if (peerConnection) {
          setStatus('Sharing');
          resyncButton.disabled = false;
        }
        log('resync: publish restored');
      }, RESYNC_DURATION_MS);
    }

    async function applyEncoderParameters(sender, height) {
      // Hold resolution constant under load (drop framerate/quality instead) so a
      // congestion-driven resolution change never stalls the RTSP/Kodi pipeline,
      // and give the encoder generous bitrate headroom for full-frame changes.
      const params = sender.getParameters();
      if (!params.encodings || params.encodings.length === 0) {
        params.encodings = [{}];
      }
      params.degradationPreference = 'maintain-resolution';
      params.encodings[0].maxBitrate = bitrateForHeight(height);
      try {
        await sender.setParameters(params);
        log('applied encoder parameters', { maxBitrate: params.encodings[0].maxBitrate });
      } catch (error) {
        logError('could not apply encoder parameters', error);
      }
    }

    async function startSharing() {
      log('starting screen share flow');
      setStatus('Requesting permission...');
      // audio: true shares screen/system audio (and gives Kodi an audio master clock —
      // see resync). systemAudio: 'include' nudges Chrome toward system (not just tab)
      // audio. selfBrowserSurface: 'exclude' keeps this control tab out of the picker so
      // the presenter can't capture it (avoids the "hall of mirrors" feedback).
      stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: { ideal: 30 } }, audio: true, selfBrowserSurface: 'exclude', systemAudio: 'include' });
      log('screen capture granted', { videoTracks: stream.getVideoTracks().length, audioTracks: stream.getAudioTracks().length });

      const [screenTrack] = stream.getVideoTracks();
      screenTrack.onended = () => {
        log('screen capture ended by browser/user');
        stopSharing();
      };

      setStatus('Checking availability...');
      await ensureAvailability();

      setStatus('Connecting...');
      const { canvasTrack, height } = await startCompositor(stream);

      const whipUrl = '/screenshare/whip';
      const iceServers = await requestIceServers(whipUrl);
      peerConnection = new RTCPeerConnection({ iceServers, sdpSemantics: 'unified-plan' });
      log('created RTCPeerConnection', { iceServers: iceServers.length });
      peerConnection.onicecandidate = handleLocalCandidate;
      peerConnection.onconnectionstatechange = handleConnectionStateChange;

      const transceiver = peerConnection.addTransceiver(canvasTrack, { direction: 'sendonly', streams: [compositorStream] });
      videoSender = transceiver.sender;
      preferHardwareFriendlyCodec(transceiver);
      await applyEncoderParameters(transceiver.sender, height);
      log('added normalized canvas track to peer connection');

      // Publish the screen-capture audio track too, if the browser provided one.
      // Besides sharing sound, this gives Kodi an audio master clock to pace to, which
      // should stop the slow video-buffer creep on long sessions. Firefox/Linux usually
      // does not capture getDisplayMedia audio, so the track may be absent there.
      const [audioTrack] = stream.getAudioTracks();
      if (audioTrack) {
        audioSender = peerConnection.addTransceiver(audioTrack, { direction: 'sendonly', streams: [stream] }).sender;
        log('added screen-capture audio track', { label: audioTrack.label });
      } else {
        log('no screen-capture audio track (browser/OS did not provide one)');
      }

      const offer = await peerConnection.createOffer();
      offerData = parseOfferData(offer.sdp);
      await peerConnection.setLocalDescription(offer);
      log('created local SDP offer', { mediaSections: offerData.medias.length });

      log('posting WHIP offer', whipUrl);
      const whipResponse = await fetch(whipUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: offer.sdp,
      });
      if (whipResponse.status !== 201) throw new Error(`WHIP publish failed: ${whipResponse.status}`);
      log('WHIP offer accepted', { status: whipResponse.status });

      const answer = await whipResponse.text();
      await peerConnection.setRemoteDescription({ type: 'answer', sdp: answer });
      log('remote SDP answer applied');

      const locationHeader = whipResponse.headers.get('Location');
      whipResourceUrl = locationHeader ? new URL(locationHeader, whipResponse.url).toString() : null;
      log('WHIP session URL established', whipResourceUrl);

      if (queuedCandidates.length > 0) {
        log('flushing queued ICE candidates', { count: queuedCandidates.length });
        await sendLocalCandidates(queuedCandidates);
        queuedCandidates = [];
      }

      setStatus('Waiting for media connection...');
      log('waiting for peer connection to reach connected state');
    }

    async function stopSharing() {
      log('stopping screen share flow');
      stopMonitoring();
      if (whipResourceUrl) {
        log('sending WHIP DELETE', whipResourceUrl);
        await fetch(whipResourceUrl, { method: 'DELETE' }).catch(() => {});
      }
      if (peerConnection) peerConnection.close();
      stopCompositor();
      if (stream) stream.getTracks().forEach(track => track.stop());

      stream = null;
      peerConnection = null;
      videoSender = null;
      audioSender = null;
      whipResourceUrl = null;
      offerData = null;
      queuedCandidates = [];
      setSharingUI(false);
      setStatus('Idle');
      log('screen share flow reset to idle');
    }

    // --- Latency / quality monitoring ---------------------------------------

    function startMonitoring() {
      if (metricsTimer) return;
      metricsEl.hidden = false;
      prevSenderStats = null;
      sampleMetrics();
      metricsTimer = setInterval(sampleMetrics, METRICS_INTERVAL_MS);
    }

    function stopMonitoring() {
      if (metricsTimer) {
        clearInterval(metricsTimer);
        metricsTimer = null;
      }
      metricsEl.hidden = true;
      lagValueEl.textContent = '–';
      encStatsEl.textContent = '–';
      prevSenderStats = null;
    }

    async function sampleMetrics() {
      await Promise.all([sampleServerLag(), sampleSenderStats()]);
    }

    async function sampleServerLag() {
      try {
        const response = await fetch('/api/metrics');
        if (!response.ok) return;
        const data = await response.json();
        const samples = Array.isArray(data.samples) ? data.samples : [];
        lagValueEl.textContent = data.active ? `${(data.current || 0).toFixed(1)} s` : '–';
        drawLagChart(samples);
      } catch (error) {
        logError('failed to fetch latency metrics', error);
      }
    }

    async function sampleSenderStats() {
      if (!peerConnection) return;
      try {
        const stats = await peerConnection.getStats();
        let outbound;
        const codecReports = new Map();
        stats.forEach((report) => {
          if (report.type === 'outbound-rtp' && report.kind === 'video') outbound = report;
          else if (report.type === 'codec') codecReports.set(report.id, report);
        });
        if (!outbound) return;

        let bitrateText = '';
        if (prevSenderStats && outbound.timestamp > prevSenderStats.timestamp) {
          const bits = (outbound.bytesSent - prevSenderStats.bytes) * 8;
          const seconds = (outbound.timestamp - prevSenderStats.timestamp) / 1000;
          if (seconds > 0) bitrateText = `${(bits / seconds / 1e6).toFixed(1)} Mbps`;
        }
        prevSenderStats = { bytes: outbound.bytesSent, timestamp: outbound.timestamp };

        const codecReport = outbound.codecId ? codecReports.get(outbound.codecId) : null;
        const codec = codecReport && codecReport.mimeType ? codecReport.mimeType.replace(/^video\//i, '') : '';
        const res = outbound.frameWidth && outbound.frameHeight ? `${outbound.frameWidth}×${outbound.frameHeight}` : '';
        const fps = outbound.framesPerSecond != null ? `${Math.round(outbound.framesPerSecond)} fps` : '';
        const limit = outbound.qualityLimitationReason && outbound.qualityLimitationReason !== 'none'
          ? `limited: ${outbound.qualityLimitationReason}` : '';
        encStatsEl.textContent = [codec, res, fps, bitrateText, limit].filter(Boolean).join(' · ') || '–';
      } catch (error) {
        logError('failed to read sender stats', error);
      }
    }

    function drawLagChart(samples) {
      const ctx = lagChart.getContext('2d');
      const w = lagChart.width;
      const h = lagChart.height;
      ctx.clearRect(0, 0, w, h);

      if (samples.length < 2) return;

      const lags = samples.map((s) => s.lag);
      const minT = samples[0].t;
      const maxT = samples[samples.length - 1].t;
      const spanT = Math.max(1, maxT - minT);
      const maxLag = Math.max(2, ...lags);

      const x = (t) => ((t - minT) / spanT) * (w - 8) + 4;
      const y = (lag) => h - 4 - (lag / maxLag) * (h - 8);

      // y-axis gridline at the latency target (1.5s).
      ctx.strokeStyle = '#e0a0a0';
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(4, y(1.5));
      ctx.lineTo(w - 4, y(1.5));
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = '#3070c0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      samples.forEach((s, i) => {
        const px = x(s.t);
        const py = y(s.lag);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();
    }

    shareButton.addEventListener('click', async () => {
      try {
        await startSharing();
      } catch (error) {
        logError('could not start sharing', error);
        await stopSharing();
        setStatus(error.message || 'Could not start sharing.');
      }
    });

    stopButton.addEventListener('click', () => {
      stopSharing().catch(error => {
        logError('could not stop cleanly', error);
        setStatus('Could not stop cleanly.');
      });
    });

    resyncButton.addEventListener('click', () => {
      resync('manual').catch(error => logError('resync failed', error));
    });
  </script>
</body>
</html>
