name: Package Kodi Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: arm64
          # - os: linux
          #   arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@v2

      - name: Package addon
        run: just package-addon
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Rename zip for platform
        run: mv build/service.kodi-screenshare.zip build/service.kodi-screenshare-${{ matrix.os }}-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: service.kodi-screenshare-${{ matrix.os }}-${{ matrix.arch }}
          path: build/service.kodi-screenshare-${{ matrix.os }}-${{ matrix.arch }}.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/service.kodi-screenshare-${{ matrix.os }}-${{ matrix.arch }}.zip
